
server:
  port: 8000
spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: media-service
              uri: ${MEDIA_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/api/v1/images/**,/api/v1/files/**

            - id: identity-service
              uri: ${IDENTITY_SERVICE_URI:http://localhost:9010}
              predicates:
                - Path=/api/v1/security/**,/api/v1/identities/**

            - id: course-service
              uri: ${COURSE_SERVICE_URI:http://localhost:9020}
              predicates:
                - Path=/api/v1/courses/**,/api/v1/projects/**