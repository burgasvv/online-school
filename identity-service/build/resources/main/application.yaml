
ktor:
  deployment:
    port: 8010
    sslPort: 9010
  security:
    ssl:
      keyStore: $CERTIFICATE_PATH:identity-service/certificate/keystore.jks
      keyAlias: mykeyalias
      keyStorePassword: mypassword
      privateKeyPassword: mypassword
  application:
    modules:
      - org.burgas.serialization.SerializationKt.configureSerialization
      - org.burgas.security.SecurityKt.configureSecurity
      - org.burgas.router.SecurityRouterKt.configureSecurityRouter