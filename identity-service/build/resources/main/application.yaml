
ktor:
  deployment:
    port: 9010
  postgres:
    driver: 'org.postgresql.Driver'
    url: '$POSTGRES_URL:jdbc:postgresql://localhost:5010/identity-service-db'
    username: '$POSTGRES_USERNAME:postgres'
    password: '$POSTGRES_PASSWORD:postgres'
  application:
    modules:
      - org.burgas.MainKt.mainModule