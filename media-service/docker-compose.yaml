
services:

  postgres:
    container_name: media-service-postgres
    image: postgres:latest
    restart: unless-stopped
    ports:
      - "5000:5432"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media-service-db
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: